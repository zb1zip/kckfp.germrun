<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Germ Run</title>
<style>
html, body { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
body { font-family:sans-serif; background: url('sky.png') no-repeat center center fixed; background-size: cover; }
#gameContainer { width:100%; height:100%; position:relative; }
#topButtons { position:absolute; top:10px; width:100%; text-align:center; z-index:20; }
#topButtons button { padding:6px 12px; margin:0 5px; cursor:pointer; }
canvas { display:block; width:100%; height:100%; }
#startScreen, #tutorialScreen, #gameOver, #ending { 
  position:absolute; top:0; left:0; width:100%; height:100%; background: rgba(204,231,255,0.95); 
  display:none; justify-content:center; align-items:center; flex-direction:column; z-index:10;
}
button.screen-btn { padding:10px 20px; margin-top:10px; cursor:pointer; }
#ending img { width:200px; height:200px; margin-top:20px; }
#ending button { margin:10px; }
</style>
</head>
<body>

<div id="gameContainer">
<div id="topButtons">
  <button onclick="changeLanguage('ko')">🇰🇷</button>
  <button onclick="changeLanguage('en')">🇺🇸</button>
  <button onclick="toggleMusic()" id="musicBtn">🔊</button>
  <button onclick="showCreator()">👨‍💻</button>
</div>

<canvas id="gameCanvas"></canvas>

<div id="startScreen">
  <h1 id="title"></h1>
  <button onclick="showTutorial()" class="screen-btn" id="startBtn"></button>
</div>

<div id="tutorialScreen">
  <h2 id="tutorialText"></h2>
  <button onclick="startGameFromTutorial()" class="screen-btn">NEXT</button>
</div>

<div id="gameOver">
  <h1 id="failText"></h1>
  <button onclick="restartGame()" class="screen-btn" id="retryBtn"></button>
  <button onclick="goStart()" class="screen-btn" id="quitBtn"></button>
  <button onclick="showEnding()" class="screen-btn" id="forceEndingBtn" style="display:none;">엔딩 보기</button>
</div>

<div id="ending">
  <h1 id="successText"></h1>
  <img src="qrcode.png" alt="QR Code">
  <div>
    <button onclick="goStart()">HOME</button>
    <button onclick="window.location.href='https://youtu.be/i5S7DBQnqP0?si=uVqEzJb4tA-EdyaP'">사이트 이동</button>
  </div>
</div>
</div>

<audio id="bgm" loop>
  <source src="moodmode-no-copyright-music-201745.mp3" type="audio/mpeg">
</audio>

<script>
const texts = {
  ko:{title:"🦠 세균 달리기",start:"게임 시작",tutorial:"스페이스바 또는 화면 터치로 점프!",fail:"실패!",retry:"다시 도전",quit:"그만하기",success:"성공!"},
  en:{title:"🦠 Germ Run",start:"Start Game",tutorial:"Press SPACE or tap to jump!",fail:"Failed!",retry:"Retry",quit:"Quit",success:"Success!"}
};

let currentLang="ko", gameState="start", isMusicPlaying=false;
let successCount=0, failCount=0;
const targetSuccess=5;

const gameSettings = { speed:4, jump:-18, gravity:0.9 };

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// 이미지 로드
let playerImg = new Image(); playerImg.src = "germ.png";
let obsImg = new Image(); obsImg.src = "pill.png";

let imagesLoaded = 0;
[playerImg, obsImg].forEach(img=>{
  img.onload = ()=>{ imagesLoaded++; if(imagesLoaded===2){ document.getElementById("startScreen").style.display="flex"; } };
});

let player = {x:50, y:0, w:50, h:50, vy:0, jumping:false};
function getGroundY(){ return canvas.height-80; }

let obstacles = [];
const minGap = 500, maxGap = 800;
let kickEffect = null, kickDuration = 120;
let lastTime = null;

function jump(){
  if(!player.jumping && gameState==="playing"){
    player.vy = gameSettings.jump;
    player.jumping = true;
    kickEffect = {x:player.x, y:player.y, timer: kickDuration};
  }
}

document.addEventListener("keydown", e=>{ if(e.code==="Space") jump(); });
canvas.addEventListener("touchstart", e=>{ e.preventDefault(); jump(); }, { passive:false });

function gameLoop(timestamp){
  if(gameState!=="playing") return;
  if(!lastTime) lastTime=timestamp;
  lastTime = timestamp;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#7cfc00"; ctx.fillRect(0,canvas.height-20,canvas.width,20);

  // 플레이어 물리
  player.vy += gameSettings.gravity;
  player.y += player.vy;
  if(player.y>=getGroundY()){ player.y=getGroundY(); player.jumping=false; player.vy=0; }

  ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

  // Kick 효과
  if(kickEffect){
    let progress = 1 - (kickEffect.timer/kickDuration);
    let alpha = 1 - progress;
    let floatY = progress*50;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "red"; ctx.font="bold 30px Arial";
    ctx.fillText("Kick!", kickEffect.x, kickEffect.y-floatY);
    ctx.restore();
    kickEffect.timer--;
    if(kickEffect.timer<=0) kickEffect=null;
  }

  // 장애물 생성
  const gap = Math.random()*(maxGap-minGap)+minGap;
  if(obstacles.length===0 || obstacles[obstacles.length-1].x < canvas.width-gap){
    obstacles.push({x:canvas.width, y:getGroundY(), w:50, h:50, passed:false});
  }

  for(let i=obstacles.length-1;i>=0;i--){
    let o = obstacles[i];
    o.x -= gameSettings.speed;
    ctx.drawImage(obsImg,o.x,o.y,o.w,o.h);

    const pad = 10;
    if(player.x+pad < o.x+o.w && player.x+player.w-pad > o.x && player.y+pad < o.y+o.h && player.y+player.h-pad > o.y){
      gameOver(); return;
    }

    if(!o.passed && o.x+o.w < player.x){ 
      o.passed=true; successCount++; 
      if(successCount>=targetSuccess){ showEnding(); return; } 
    }
    if(o.x+o.w < 0) obstacles.splice(i,1);
  }

  requestAnimationFrame(gameLoop);
}

function showTutorial(){ document.getElementById("startScreen").style.display="none"; document.getElementById("tutorialScreen").style.display="flex"; }
function startGameFromTutorial(){ document.getElementById("tutorialScreen").style.display="none"; startGame(); toggleMusic(); }
function startGame(){ 
  player.y=getGroundY(); player.vy=0; obstacles=[]; successCount=0; lastTime=null; gameState="playing"; 
  document.getElementById("gameOver").style.display="none"; 
  requestAnimationFrame(gameLoop);
}

function restartGame(){ document.getElementById("gameOver").style.display="none"; startGame(); }
function gameOver(){ 
  gameState="gameover"; 
  failCount++; 
  const forceBtn=document.getElementById("forceEndingBtn"); 
  if(failCount>=3) forceBtn.style.display="block"; 
  document.getElementById("gameOver").style.display="flex"; 
}
function goStart(){ gameState="start"; document.getElementById("gameOver").style.display="none"; document.getElementById("ending").style.display="none"; document.getElementById("startScreen").style.display="flex"; }
function showEnding(){ gameState="ended"; document.getElementById("gameOver").style.display="none"; document.getElementById("ending").style.display="flex"; }

function toggleMusic(){
  const bgm=document.getElementById("bgm");
  const btn=document.getElementById("musicBtn");
  if(isMusicPlaying){ bgm.pause(); btn.innerText="🔇"; isMusicPlaying=false; } 
  else{ bgm.play().catch(()=>{}); btn.innerText="🔊"; isMusicPlaying=true; }
}

function showCreator(){ alert(currentLang==="ko"?"제작자: @modu-test00":"Created by: @modu_test00"); }
function updateText(){
  document.getElementById("title").innerText=texts[currentLang].title;
  document.getElementById("startBtn").innerText=texts[currentLang].start;
  document.getElementById("tutorialText").innerText=texts[currentLang].tutorial;
  document.getElementById("failText").innerText=texts[currentLang].fail;
  document.getElementById("retryBtn").innerText=texts[currentLang].retry;
  document.getElementById("quitBtn").innerText=texts[currentLang].quit;
  document.getElementById("successText").innerText=texts[currentLang].success;
}
function changeLanguage(lang){ currentLang=lang; updateText(); }

window.onload = () => {
  updateText();
};
</script>

</body>
</html>
