<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Germ Run</title>
<style>
body { 
  margin:0; 
  overflow:hidden; 
  font-family:sans-serif; 
  background: url('sky.png') no-repeat center center fixed; 
  background-size: cover;
}
#gameContainer { width:100vw; height:100vh; position:relative; }
#topButtons { position:absolute; top:10px; width:100%; text-align:center; z-index:20; }
#topButtons button { padding:6px 12px; margin:0 5px; cursor:pointer; }
canvas { width:100vw; height:100vh; display:block; }
#startScreen, #tutorialScreen, #gameOver, #ending { 
  position:absolute; top:0; left:0; width:100%; height:100%; 
  background:rgba(204,231,255,0.95); display:none; 
  justify-content:center; align-items:center; flex-direction:column; z-index:10; 
}
button.screen-btn { padding:10px 20px; margin-top:10px; cursor:pointer; }
#ending img { width:200px; height:200px; margin-top:20px; }
#ending button { margin:10px; }
</style>
</head>
<body>

<div id="gameContainer">

<div id="topButtons">
  <button onclick="changeLanguage('ko')">🇰🇷</button>
  <button onclick="changeLanguage('en')">🇺🇸</button>
  <button onclick="toggleMusic()" id="musicBtn">🔊</button>
  <button onclick="showCreator()">👨‍💻</button>
</div>

<canvas id="gameCanvas"></canvas>

<div id="startScreen">
  <h1 id="title"></h1>
  <button onclick="showTutorial()" class="screen-btn" id="startBtn"></button>
</div>

<div id="tutorialScreen">
  <h2 id="tutorialText"></h2>
  <button onclick="startGameFromTutorial()" class="screen-btn">NEXT</button>
</div>

<div id="gameOver">
  <h1 id="failText"></h1>
  <button onclick="restartGame()" class="screen-btn" id="retryBtn"></button>
  <button onclick="goStart()" class="screen-btn" id="quitBtn"></button>
</div>

<div id="ending">
  <h1 id="successText"></h1>
  <img src="qrcode.png" alt="QR Code">
  <div>
    <button onclick="goStart()">HOME</button>
    <button onclick="window.location.href='https://youtu.be/stfOGdsgZUU?si=DHn5y1PAHhOpNNJI'">사이트 이동</button>
  </div>
</div>

</div>

<audio id="bgm" loop>
  <source src="moodmode-no-copyright-music-201745.mp3" type="audio/mpeg">
</audio>

<script>
// 다국어 텍스트
const texts = {
  ko:{title:"🦠 세균 달리기",start:"게임 시작",tutorial:"스페이스바 또는 화면 터치로 점프!",fail:"실패!",retry:"다시 도전",quit:"그만하기",success:"성공!"},
  en:{title:"🦠 Germ Run",start:"Start Game",tutorial:"Press SPACE or tap to jump!",fail:"Failed!",retry:"Retry",quit:"Quit",success:"Success!"}
};

let currentLang="ko", gameState="start", isMusicPlaying=false;
let distance=0, targetDistance=800;

// 캔버스 설정
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
function resizeCanvas(){canvas.width=window.innerWidth; canvas.height=window.innerHeight;}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

// 이미지
let playerImg=new Image(); playerImg.src="germ.png";
let obsImg=new Image(); obsImg.src="pill.png";

// 플레이어
let player={x:50, y:0, w:50, h:50, vy:0, jumping:false};
function getGroundY(){return canvas.height-80;}

// 장애물
let obstacles=[];

// Kick 효과
let kickEffect=null;
const kickDuration=120;

// 점프
function jump(){
  if(!player.jumping && gameState==="playing"){
    player.vy=-12;
    player.jumping=true;
    kickEffect={x:player.x, y:player.y, timer:kickDuration};
  }
}
document.addEventListener("keydown", e=>{if(e.code==="Space") jump();});
document.addEventListener("touchstart", jump);

// 시간 기반 거리 증가
let lastTime = 0;
const distanceSpeed = 80; // units/sec (속도 조절 가능)

// 게임 루프
function gameLoop(timestamp){
  if(gameState!=="playing") return;

  if(!lastTime) lastTime = timestamp;
  let delta = (timestamp - lastTime)/1000; // 초 단위
  lastTime = timestamp;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 땅
  ctx.fillStyle="#7cfc00";
  ctx.fillRect(0,canvas.height-20,canvas.width,20);

  // 플레이어 물리
  player.vy+=0.6;
  player.y+=player.vy;
  if(player.y>=getGroundY()){player.y=getGroundY(); player.jumping=false; player.vy=0;}
  ctx.drawImage(playerImg,player.x,player.y,player.w,player.h);

  // Kick 애니메이션
  if(kickEffect){
    let progress=1-(kickEffect.timer/kickDuration);
    let alpha=1-progress;
    let floatY=progress*50;
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle="red";
    ctx.font="bold 30px Arial";
    ctx.fillText("Kick!", kickEffect.x, kickEffect.y-floatY);
    ctx.restore();
    kickEffect.timer--;
    if(kickEffect.timer<=0) kickEffect=null;
  }

  // 장애물 생성 및 이동
  if(Math.random() < 0.02){
    let last = obstacles[obstacles.length-1];
    if(!last || (last.x < canvas.width - 150)){
      obstacles.push({x: canvas.width, y: getGroundY(), w:50, h:50});
    }
  }

  for(let i = obstacles.length-1; i >=0; i--){
    let o = obstacles[i];
    o.x -= 6;
    ctx.drawImage(obsImg,o.x,o.y,o.w,o.h);

    // 충돌 체크
    if(player.x < o.x + o.w && player.x + player.w > o.x &&
       player.y < o.y + o.h && player.y + player.h > o.y){
         gameOver();
         return;
    }

    if(o.x + o.w < 0) obstacles.splice(i,1);
  }

  // 거리 증가
  distance += distanceSpeed * delta;

  // 목표 거리 도달 체크
  if(distance >= targetDistance){
    showEnding();
    return;
  }

  requestAnimationFrame(gameLoop);
}

// 상태 관리
function showTutorial(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("tutorialScreen").style.display="flex";
}

function startGameFromTutorial(){
  document.getElementById("tutorialScreen").style.display="none";
  startGame();
  const bgm=document.getElementById("bgm");
  bgm.play().then(()=>{ isMusicPlaying=true; document.getElementById("musicBtn").innerText="🔊";}).catch(e=>console.log("BGM 재생 실패:",e));
}

function startGame(){
  player.y=getGroundY();
  player.vy=0;
  obstacles=[];
  distance=0;
  lastTime = 0;
  gameState="playing";
  requestAnimationFrame(gameLoop);
}

function gameOver(){gameState="gameover"; document.getElementById("gameOver").style.display="flex";}
function restartGame(){document.getElementById("gameOver").style.display="none"; startGame();}
function goStart(){gameState="start"; document.getElementById("gameOver").style.display="none"; document.getElementById("ending").style.display="none"; document.getElementById("startScreen").style.display="flex";}
function showEnding(){gameState="ended"; document.getElementById("ending").style.display="flex";}

// 음악 토글
function toggleMusic(){
  const bgm=document.getElementById("bgm");
  const btn=document.getElementById("musicBtn");
  if(isMusicPlaying){bgm.pause(); btn.innerText="🔇"; isMusicPlaying=false;}
  else{bgm.play().then(()=>{isMusicPlaying=true; btn.innerText="🔊";}).catch(e=>console.log("재생 실패",e));}
}

// 제작자
function showCreator(){alert(currentLang==="ko"?"제작자: text-00":"Created by: text-00");}

// 텍스트
function updateText(){
  document.getElementById("title").innerText=texts[currentLang].title;
  document.getElementById("startBtn").innerText=texts[currentLang].start;
  document.getElementById("tutorialText").innerText=texts[currentLang].tutorial;
  document.getElementById("failText").innerText=texts[currentLang].fail;
  document.getElementById("retryBtn").innerText=texts[currentLang].retry;
  document.getElementById("quitBtn").innerText=texts[currentLang].quit;
  document.getElementById("successText").innerText=texts[currentLang].success;
}
function changeLanguage(lang){currentLang=lang; updateText();}

window.onload=()=>{
  updateText();
  document.getElementById("startScreen").style.display="flex";
};
</script>

</body>
</html>
